api:
  dashboard: true
  insecure: false
  # Dashboard accessible uniquement via le routeur Traefik avec middleware auth (cf. labels dans docker-compose)

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: nexum-network

certificatesResolvers:
  letsencrypt:
    acme:
      email: contact@votre-domaine.fr
      storage: /acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog: {}

# Rate limiting global (middleware à référencer dans les labels Docker)
http:
  middlewares:
    dashboard-auth:
      basicAuth:
        usersFile: /etc/traefik/users.htpasswd
    webhook-ratelimit:
      rateLimit:
        average: 30
        burst: 10
        period: 1m
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
